  schemas:
    DescribeGatewayInstanceResponse:
      type: object
      properties:
        GatewayInstance:
          allOf:
          - $ref: '#/components/schemas/GatewayInstance'
          - xml:
              name: gatewayInstance
    __listOfMessageDetail:
      type: array
      items:
        $ref: '#/components/schemas/MessageDetail'
    __integer:
      type: integer
    BridgePlacement:
      type: string
      enum:
      - AVAILABLE
      - LOCKED
    ListedGatewayInstance:
      type: object
      required:
      - GatewayArn
      - GatewayInstanceArn
      - InstanceId
      properties:
        GatewayArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayArn
            description: The Amazon Resource Name (ARN) of the gateway.
        GatewayInstanceArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayInstanceArn
            description: The Amazon Resource Name (ARN) of the instance.
        InstanceId:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: instanceId
            description: The managed instance ID generated by the SSM install. This will begin with "mi-".
        InstanceState:
          allOf:
          - $ref: '#/components/schemas/InstanceState'
          - xml:
              name: instanceState
            description: The status of the instance.
      description: Provides a summary of an instance.
    UpdateGatewayInstanceResponse:
      type: object
      properties:
        BridgePlacement:
          allOf:
          - $ref: '#/components/schemas/BridgePlacement'
          - xml:
              name: bridgePlacement
            description: The availability of the instance to host new bridges. The bridgePlacement property can be LOCKED or AVAILABLE. If it is LOCKED, no new bridges can be deployed to this instance. If it is AVAILABLE, new bridges can be added to this instance.
        GatewayInstanceArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayInstanceArn
            description: The Amazon Resource Name (ARN) of the instance.
    DeregisterGatewayInstanceResponse:
      type: object
      properties:
        GatewayInstanceArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayInstanceArn
            description: The Amazon Resource Name (ARN) of the instance.
        InstanceState:
          allOf:
          - $ref: '#/components/schemas/InstanceState'
          - xml:
              name: instanceState
            description: The status of the instance.
    GatewayInstance:
      type: object
      required:
      - GatewayArn
      - InstanceState
      - GatewayInstanceArn
      - InstanceId
      - RunningBridgeCount
      - BridgePlacement
      - ConnectionStatus
      properties:
        BridgePlacement:
          allOf:
