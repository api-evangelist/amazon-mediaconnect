          - $ref: '#/components/schemas/ConnectionStatus'
          - xml:
              name: connectionStatus
            description: The connection state of the instance.
        GatewayArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayArn
            description: The Amazon Resource Name (ARN) of the instance.
        GatewayInstanceArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayInstanceArn
            description: The Amazon Resource Name (ARN) of the gateway.
        InstanceId:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: instanceId
            description: The managed instance ID generated by the SSM install. This will begin with "mi-".
        InstanceMessages:
          allOf:
          - $ref: '#/components/schemas/__listOfMessageDetail'
          - xml:
              name: instanceMessages
        InstanceState:
          allOf:
          - $ref: '#/components/schemas/InstanceState'
          - xml:
              name: instanceState
            description: The status of the instance.
        RunningBridgeCount:
          allOf:
          - $ref: '#/components/schemas/__integer'
          - xml:
              name: runningBridgeCount
            description: The running bridge count.
      description: The settings for an instance in a gateway.
    ConnectionStatus:
      type: string
      enum:
      - CONNECTED
      - DISCONNECTED
    InternalServerErrorException: {}
    ListGatewayInstancesResponse:
      type: object
      properties:
        Instances:
          allOf:
          - $ref: '#/components/schemas/__listOfListedGatewayInstance'
          - xml:
              name: instances
            description: A list of instance summaries.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: nextToken
            description: The token that identifies which batch of results that you want to see. For example, you submit a ListInstances request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListInstances request a second time and specify the NextToken value.
