              schema:
                $ref: '#/components/schemas/ForbiddenException'
              examples:
                CreateGateway483Example:
                  summary: Default CreateGateway 483 response
                  x-microcks-default: true
                  value:
                    result: success
        '484':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
              examples:
                CreateGateway484Example:
                  summary: Default CreateGateway 484 response
                  x-microcks-default: true
                  value:
                    result: success
        '485':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                CreateGateway485Example:
                  summary: Default CreateGateway 485 response
                  x-microcks-default: true
                  value:
                    result: success
        '486':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
              examples:
                CreateGateway486Example:
                  summary: Default CreateGateway 486 response
                  x-microcks-default: true
                  value:
                    result: success
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - egressCidrBlocks
              - name
              - networks
              properties:
                egressCidrBlocks:
                  description: The range of IP addresses that are allowed to contribute content or initiate output requests for flows communicating with this gateway. These IP addresses should be in the form of a Classless Inter-Domain Routing (CIDR) block; for example, 10.0.0.0/16.
                  type: array
                  items:
                    $ref: '#/components/schemas/__string'
                name:
                  description: The name of the gateway. This name can not be modified after the gateway is created.
                  type: string
                networks:
                  description: The list of networks that you want to add.
                  type: array
                  items:
                    $ref: '#/components/schemas/GatewayNetwork'
      summary: Amazon MediaConnect Create Gateway
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Gateways
    get:
      operationId: ListGateways
      description: Displays a list of gateways that are associated with this account. This request returns a paginated result.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGatewaysResponse'
              examples:
                ListGateways200Example:
                  summary: Default ListGateways 200 response
                  x-microcks-default: true
                  value:
                    Gateways: example-value
                    NextToken: example-value
        '480':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
              examples:
                ListGateways480Example:
                  summary: Default ListGateways 480 response
                  x-microcks-default: true
                  value:
                    result: success
        '481':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
