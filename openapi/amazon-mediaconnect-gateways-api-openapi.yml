    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreateGateway
      description: Creates a new gateway. The request must include at least one network (up to 4).
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGatewayResponse'
              examples:
                CreateGateway201Example:
                  summary: Default CreateGateway 201 response
                  x-microcks-default: true
                  value:
                    Gateway: example-value
        '480':
          description: CreateGateway420Exception
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGateway420Exception'
              examples:
                CreateGateway480Example:
                  summary: Default CreateGateway 480 response
                  x-microcks-default: true
                  value:
                    result: success
        '481':
          description: BadRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
              examples:
                CreateGateway481Example:
                  summary: Default CreateGateway 481 response
                  x-microcks-default: true
                  value:
                    result: success
        '482':
          description: InternalServerErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
              examples:
                CreateGateway482Example:
                  summary: Default CreateGateway 482 response
                  x-microcks-default: true
                  value:
                    result: success
        '483':
          description: ForbiddenException
          content:
