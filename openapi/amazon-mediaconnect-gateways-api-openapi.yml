components:
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  schemas:
    __listOfGatewayNetwork:
      type: array
      items:
        $ref: '#/components/schemas/GatewayNetwork'
    __listOf__string:
      type: array
      items:
        $ref: '#/components/schemas/__string'
    CreateGatewayResponse:
      type: object
      properties:
        Gateway:
          allOf:
          - $ref: '#/components/schemas/Gateway'
          - xml:
              name: gateway
    DescribeGatewayResponse:
      type: object
      properties:
        Gateway:
          allOf:
          - $ref: '#/components/schemas/Gateway'
          - xml:
              name: gateway
    __listOfMessageDetail:
      type: array
      items:
        $ref: '#/components/schemas/MessageDetail'
    GatewayState:
      type: string
      enum:
      - CREATING
      - ACTIVE
      - UPDATING
      - ERROR
      - DELETING
      - DELETED
    ListGatewaysResponse:
      type: object
      properties:
        Gateways:
          allOf:
          - $ref: '#/components/schemas/__listOfListedGateway'
          - xml:
              name: gateways
            description: A list of gateway summaries.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: nextToken
            description: The token that identifies which batch of results that you want to see. For example, you submit a ListGateways request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListGateways request a second time and specify the NextToken value.
    DeleteGatewayResponse:
      type: object
      properties:
        GatewayArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayArn
            description: The Amazon Resource Name (ARN) of the gateway that was deleted.
    InternalServerErrorException: {}
    Gateway:
      type: object
      required:
      - GatewayArn
      - Networks
      - EgressCidrBlocks
      - Name
      properties:
        EgressCidrBlocks:
          allOf:
          - $ref: '#/components/schemas/__listOf__string'
          - xml:
              name: egressCidrBlocks
            description: The range of IP addresses that contribute content or initiate output requests for flows communicating with this gateway. These IP addresses should be in the form of a Classless Inter-Domain Routing (CIDR) block; for example, 10.0.0.0/16.
        GatewayArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayArn
            description: The Amazon Resource Name (ARN) of the gateway.
        GatewayMessages:
          allOf:
          - $ref: '#/components/schemas/__listOfMessageDetail'
          - xml:
              name: gatewayMessages
        GatewayState:
          allOf:
          - $ref: '#/components/schemas/GatewayState'
          - xml:
              name: gatewayState
            description: The current status of the gateway.
        Name:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: name
            description: The name of the gateway. This name can not be modified after the gateway is created.
        Networks:
          allOf:
          - $ref: '#/components/schemas/__listOfGatewayNetwork'
          - xml:
              name: networks
            description: The list of networks in the gateway.
      description: The settings for a gateway, including its networks.
    GatewayNetwork:
      type: object
      required:
      - CidrBlock
      - Name
      properties:
        CidrBlock:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: cidrBlock
            description: A unique IP address range to use for this network. These IP addresses should be in the form of a Classless Inter-Domain Routing (CIDR) block; for example, 10.0.0.0/16.
        Name:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: name
            description: The name of the network. This name is used to reference the network and must be unique among networks in this gateway.
      description: The network settings for a gateway.
    CreateGateway420Exception: {}
    ConflictException: {}
    ForbiddenException: {}
    BadRequestException: {}
    ListedGateway:
      type: object
      required:
      - GatewayArn
      - GatewayState
      - Name
      properties:
        GatewayArn:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: gatewayArn
            description: The Amazon Resource Name (ARN) of the gateway.
        GatewayState:
          allOf:
          - $ref: '#/components/schemas/GatewayState'
          - xml:
              name: gatewayState
        Name:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: name
            description: The name of the gateway.
      description: Provides a summary of a gateway, including its name, ARN, and status.
    NotFoundException: {}
    ServiceUnavailableException: {}
    TooManyRequestsException: {}
    __string:
      type: string
    __listOfListedGateway:
      type: array
      items:
        $ref: '#/components/schemas/ListedGateway'
    MessageDetail:
      type: object
      required:
      - Message
      - Code
      properties:
        Code:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: code
            description: The error code.
        Message:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: message
            description: The specific error message that MediaConnect returns to help you understand the reason that the request did not succeed.
        ResourceName:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: resourceName
            description: The name of the resource.
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/mediaconnect/
