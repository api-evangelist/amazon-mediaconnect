            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
              examples:
                DeleteGateway486Example:
                  summary: Default DeleteGateway 486 response
                  x-microcks-default: true
                  value:
                    result: success
      parameters:
      - name: gatewayArn
        in: path
        required: true
