        schema:
          type: string
        example: arn:aws:mediaconnect:us-east-1:123456789012:flow:example-flow
      summary: Amazon MediaConnect Delete Gateway
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Gateways
    get:
      operationId: DescribeGateway
      description: Displays the details of a gateway. The response includes the gateway ARN, name, and CIDR blocks, as well as details about the networks.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeGatewayResponse'
              examples:
                DescribeGateway200Example:
                  summary: Default DescribeGateway 200 response
                  x-microcks-default: true
