naftiko: 1.0.0-alpha1
info:
  label: Amazon MediaConnect Live Video Transport
  description: Workflow capability for live video transport operations including flow management, source configuration, output routing, and entitlement management for broadcast engineers.
  tags:
  - AWS
  - Broadcasting
  - Live Video
  - Media Transport
  - Flows
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: mediaconnect
    location: ./shared/mediaconnect.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: mediaconnect-transport-api
    description: Unified REST API for live video transport workflow management.
    resources:
    - path: /v1/flows
      name: flows
      description: Manage live video flows
      operations:
      - method: GET
        name: list-flows
        description: List all flows
        call: mediaconnect.list-flows
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-flow
        description: Create a new flow
        call: mediaconnect.create-flow
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/flows/{flowArn}
      name: flow
      description: Manage individual flow
      operations:
      - method: GET
        name: describe-flow
        description: Get flow details
        call: mediaconnect.describe-flow
        with:
          flowArn: rest.flowArn
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-flow
        description: Delete a flow
        call: mediaconnect.delete-flow
        with:
          flowArn: rest.flowArn
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bridges
      name: bridges
      description: Manage bridges
      operations:
      - method: GET
        name: list-bridges
        description: List all bridges
        call: mediaconnect.list-bridges
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entitlements
      name: entitlements
      description: Manage entitlements
      operations:
      - method: GET
        name: list-entitlements
        description: List all entitlements
        call: mediaconnect.list-entitlements
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: mediaconnect-transport-mcp
    transport: http
    description: MCP server for AI-assisted live video transport workflow management.
    tools:
    - name: list-flows
      description: List all MediaConnect flows for live video transport
      hints:
        readOnly: true
        openWorld: true
      call: mediaconnect.list-flows
      outputParameters:
      - type: object
        mapping: $.
    - name: create-flow
      description: Create a new MediaConnect flow
      hints:
        readOnly: false
      call: mediaconnect.create-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-flow
      description: Get details of a specific flow
      hints:
        readOnly: true
      call: mediaconnect.describe-flow
      with:
        flowArn: tools.flowArn
      outputParameters:
      - type: object
        mapping: $.
    - name: start-flow
      description: Start a MediaConnect flow
      hints:
        readOnly: false
      call: mediaconnect.start-flow
      with:
        flowArn: tools.flowArn
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-flow
      description: Stop a MediaConnect flow
      hints:
        readOnly: false
        destructive: false
      call: mediaconnect.stop-flow
      with:
        flowArn: tools.flowArn
      outputParameters:
      - type: object
        mapping: $.
    - name: list-bridges
      description: List all MediaConnect bridges
      hints:
        readOnly: true
      call: mediaconnect.list-bridges
      outputParameters:
      - type: object
        mapping: $.
    - name: list-entitlements
      description: List all flow entitlements
      hints:
        readOnly: true
      call: mediaconnect.list-entitlements
      outputParameters:
      - type: object
        mapping: $.
    - name: list-gateways
      description: List all MediaConnect gateways
      hints:
        readOnly: true
      call: mediaconnect.list-gateways
      outputParameters:
      - type: object
        mapping: $.
