        description: Amazon MediaConnect Add Bridge Outputs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bridgeArn
          in: path
          type: string
          required: true
          description: The ARN of the bridge that you want to update.
        body:
          type: json
          data: {}
      - name: add-bridge-sources
