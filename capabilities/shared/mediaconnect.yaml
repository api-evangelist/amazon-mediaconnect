naftiko: 1.0.0-alpha1
info:
  label: AWS Elemental MediaConnect API
  description: AWS Elemental MediaConnect API for live video transport - flows, sources, outputs, entitlements, and bridges.
  tags:
  - AWS
  - Broadcasting
  - Live Video
  - Media Transport
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
