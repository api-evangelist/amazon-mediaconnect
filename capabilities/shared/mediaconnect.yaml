        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filterArn
          in: query
          type: string
          required: false
          description: Filter the list results to display only the bridges associated with the selected Amazon Resource Name (ARN).
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of results to return per API request. For example, you submit a ListBridges request with MaxResults set at 5. Although 20 items match your request, the 
            service returns no more than the first 5 items. (The service also returns a NextToken value that you can use to fetch the next batch of results.) The service might return fewer results 
            than the MaxResults value. If MaxResults is not included in the request, the service defaults to pagination with a maximum of 10 results per page.
        - name: nextToken
          in: query
          type: string
          required: false
          description: The token that identifies which batch of results that you want to see. For example, you submit a ListBridges request with MaxResults set at 5. The service returns the first 
            batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListBridges request a second time and specify the NextToken value.
        - name: MaxResults
          in: query
          type: string
          required: false
          description: Pagination limit
        - name: NextToken
          in: query
          type: string
          required: false
          description: Pagination token
